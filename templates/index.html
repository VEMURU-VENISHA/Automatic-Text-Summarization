<!DOCTYPE html>
<html>
<head>
<title>GAN Text Summarizer</title>

<style>
body{
font-family:Arial;
background:#eef2ff;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:14px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#45a049;
}

select,input[type="range"]{
margin:5px;
}

.progress{
height:20px;
background:#ddd;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:20px;
background:#4CAF50;
border-radius:10px;
text-align:center;
color:white;
line-height:20px;
}

ul{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Conditional GAN Text Summarizer</h2>

<textarea id="text" placeholder="Enter text here..."></textarea>

<br><br>

Length
<input type="range" id="length" min="50" max="200" value="120">

Mode
<select id="mode">
<option value="paragraph">Paragraph</option>
<option value="bullet">Bullet</option>
</select>

<br><br>

<button onclick="summarize()">Generate Summary</button>

<hr>

<h3>Summary</h3>
<div id="summary"></div>

<h3>Confidence Score</h3>
<div class="progress">
<div id="progressBar" class="progress-bar" style="width:0%">0%</div>
</div>

</div>

<script>

async function summarize(){

const res = await fetch("/summarize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:document.getElementById("text").value,
length:document.getElementById("length").value,
mode:document.getElementById("mode").value
})
})

const data = await res.json()

let summaryDiv = document.getElementById("summary")
summaryDiv.innerHTML = ""  // Clear previous content

// Paragraph Mode
if(data.mode === "paragraph"){
    summaryDiv.innerHTML = "<p>" + data.summary + "</p>"
}

// Bullet Mode
if(data.mode === "bullet"){
    let ul = document.createElement("ul")
    data.bullets.forEach(b=>{
        let li = document.createElement("li")
        li.innerText = b
        ul.appendChild(li)
    })
    summaryDiv.appendChild(ul)
}

// Confidence Progress Bar
let bar = document.getElementById("progressBar")
bar.style.width = data.score + "%"
bar.innerText = data.score + "%"

}

</script>

</body>
</html>
